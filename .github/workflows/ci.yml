name: CI

# Runs the hermetic test suite on every push to main and every pull request.
# A red ✗ here means a PR broke something — it blocks merge intent before code review even starts.
# This is the repo enforcing "nothing ships with failing tests", independent of any one contributor.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run if the same branch/PR pushes again (saves CI minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Hermetic tests (Node from .nvmrc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify Node runtime
        run: npm run preflight

      - name: Run hermetic test suite
        run: node scripts/ci-test.mjs
        env:
          # The full MIT Composio catalog (services/composio/…, ~17 MB) is gitignored, so it is absent
          # in CI — point the loader at the small committed fixture so the sovereign-Composio test is
          # hermetic here. Local runs (with the real catalog present) leave this unset.
          STRATOS_COMPOSIO_DATA: ${{ github.workspace }}/packages/stratos-agent/test/fixtures/composio-catalog.ci.json

      - name: Carve-sync drift gate (trust spine — #75/#76)
        # The PQC primitive is hand-carved into the public mirrors; this fails the build if any
        # mirror's bytes drift from the canonical copy in this repo. Strict: unreachable = fail.
        run: node scripts/check-carve-sync.mjs
        env:
          CARVE_SYNC_STRICT: '1'

      - name: Honesty / claim gate (#77)
        # Banned or known-false claims on public doc surfaces fail the build (ADR-0001/0002,
        # EFL-007/EFL-010 classes). Allow marker for docs ABOUT a banned term: claim-lint:allow
        run: node scripts/claim-lint.mjs

      - name: Anonymization gate — public-surface staging (#77)
        run: node scripts/check-anonymization.mjs org-flagship
